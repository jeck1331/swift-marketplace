services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace_pwd
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql

  redis:
    image: redis:8.6
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: kafka
    hostname: kafka
    ports:
      # Для приложений на хосте (.NET локально):
      - "29092:29092"
    environment:
      # KRaft (без zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # listeners
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      # single-node настройки
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # не плодить темы случайно
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Важно: cluster id для KRaft (статичный для локалки)
      # Если будет ругаться - заменим на другой (редко, но бывает).
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    
  postgres-catalog:
    image: postgres:18
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace_pwd
      POSTGRES_DB: catalog_db
    ports:
      - "5434:5432"
    volumes:
      - pg_catalog_data:/var/lib/postgresql

  postgres-orders:
    image: postgres:18
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace_pwd
      POSTGRES_DB: orders_db
    ports:
      - "5435:5432"
    volumes:
      - pg_orders_data:/var/lib/postgresql
  
volumes:
    pg_data:
    pg_catalog_data:
    pg_orders_data:
    kafka_data:
    es_data: